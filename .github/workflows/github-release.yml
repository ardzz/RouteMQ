name: GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish as a GitHub Release, e.g. v0.17.0
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: Git tag to publish as a GitHub Release, e.g. v0.17.0
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  resolve:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      skip: ${{ steps.exists.outputs.skip }}
    steps:
      - name: Resolve tag
        id: release
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Invalid release tag: ${TAG}" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  github-release:
    name: Publish GitHub Release
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build package
        run: uv build

      - name: Generate SBOM (CycloneDX)
        run: uv run cyclonedx-py environment --output-file sbom.json --output-format JSON

      - name: Sign SBOM with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: sbom.json

      - name: Build release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.resolve.outputs.version }}"
          NOTES_FILE="release-notes.md"

          awk -v version="$VERSION" '
            $0 ~ "^## v" version " " { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "No CHANGELOG.md section found for v${VERSION}" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          gh release create "$TAG" \
            dist/* \
            sbom.json \
            sbom.json.sigstore.json \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
