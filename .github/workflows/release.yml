name: Release

on:
  push:
    branches:
      - master
      - develop

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      bumped: ${{ steps.bump_detect.outputs.bumped }}
      version: ${{ steps.bump_detect.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run tests
        run: uv run python run_tests.py
      - name: Build package
        run: uv build
      - name: Generate subject hashes for SLSA provenance
        id: hash
        run: |
          echo "hashes=$(sha256sum dist/* | base64 -w0)" >> "$GITHUB_OUTPUT"
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-dist
          path: dist/
      - name: Generate SBOM (CycloneDX)
        run: uv run cyclonedx-py environment --output-file sbom.json --output-format JSON
      - name: Sign SBOM with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: sbom.json
      - name: Upload SBOM and signature
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.json
            sbom.json.sigstore.json
      - name: Read version before bump
        id: pre_version
        run: |
          PRE=$(grep -E '^version *=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${PRE}" >> "$GITHUB_OUTPUT"
      - name: Commitizen release (no push)
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # 0.27.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: true
          push: false
      - name: Detect Commitizen bump
        id: bump_detect
        run: |
          PRE="${{ steps.pre_version.outputs.version }}"
          POST=$(grep -E '^version *=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          NEW_COMMITS=$(git rev-list --count origin/master..HEAD)
          if [ "$NEW_COMMITS" -gt 0 ] && [ "$PRE" != "$POST" ]; then
            VERSION="v${POST}"
            BRANCH="release/auto-bump-${VERSION}"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "Commitizen produced a bump: ${BRANCH} (tag ${VERSION})"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No bump produced by Commitizen"
          fi
      - name: Push bump branch and tag
        if: steps.bump_detect.outputs.bumped == 'true'
        env:
          # Push the tag via the fine-grained PAT so the tag push event triggers
          # downstream workflows. GitHub deliberately suppresses workflow runs
          # for events created by GITHUB_TOKEN, which silently disables the
          # github-release.yml workflow (push on tags v*) — leaving the tag
          # pushed but no GitHub Release published.
          # See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          BRANCH="${{ steps.bump_detect.outputs.branch }}"
          VERSION="${{ steps.bump_detect.outputs.version }}"
          REPO_URL="https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          git push "${REPO_URL}" "refs/tags/${VERSION}"
      - name: Open auto-merge PR for bump
        if: steps.bump_detect.outputs.bumped == 'true'
        env:
          # Use fine-grained PAT (RELEASE_TOKEN) instead of GITHUB_TOKEN so the
          # created PR triggers downstream CI. GitHub deliberately suppresses CI
          # workflows on PRs created by GITHUB_TOKEN to prevent runaway loops.
          # See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          BRANCH="${{ steps.bump_detect.outputs.branch }}"
          VERSION="${{ steps.bump_detect.outputs.version }}"
          PR_URL=$(gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore(release): version bump to ${VERSION}" \
            --body "Automated version bump by Commitizen. Tag \`${VERSION}\` already published. Auto-merge enabled; will land on master once CI passes.")
          echo "Opened PR: ${PR_URL}"
          gh pr merge "$BRANCH" --squash --auto --delete-branch

  provenance:
    needs: release
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"

  publish-release:
    needs: release
    if: needs.release.outputs.bumped == 'true'
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/github-release.yml
    with:
      tag: ${{ needs.release.outputs.version }}
    secrets: inherit
